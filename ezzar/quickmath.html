<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMath! · Mini Game</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #a020f0;
            --correct: #10b981;
            --wrong: #ef4444;
            --text: #eef2f6;
            --bg: #0a0c0f;
            --surface: #14171c;
            --neon-glow: 0 0 10px #00f3ff66, 0 0 20px #00f3ff33;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 20px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
        }

        .card:hover {
            box-shadow: var(--neon-glow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        h1 {
            background: linear-gradient(45deg, #00f3ff, #a020f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        p {
            color: #a0a8b5;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress {
            width: 100%;
            height: 100%;
            background: #00f3ff;
            box-shadow: 0 0 10px #00f3ff;
            transition: width 1s linear;
        }

        #quest-number {
            color: #00f3ff;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .question {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(45deg, #00f3ff, #a020f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        input[type="number"] {
            width: 150px;
            padding: 15px;
            font-size: 2rem;
            background: #0a0c0f;
            border: 2px solid #a0a8b5;
            border-radius: 15px;
            text-align: center;
            color: #eef2f6;
            outline: none;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            border-color: #00f3ff;
            box-shadow: 0 0 20px #00f3ff33;
        }

        button {
            background: #00f3ff;
            color: #000;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 0 20px #00f3ff66;
        }

        button:hover {
            background: transparent;
            color: #00f3ff;
            border: 2px solid #00f3ff;
            transform: scale(1.05);
        }

        small {
            color: #a0a8b5;
            display: block;
            margin-top: 1rem;
        }

        .result-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #0a0c0f;
            border-radius: 15px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #a0a8b5;
            text-align: center;
        }

        th {
            background: #00f3ff;
            color: #000;
            font-weight: bold;
        }

        td {
            color: #eef2f6;
        }

        .row-correct {
            color: #10b981 !important;
            font-weight: bold;
        }

        .row-wrong {
            color: #ef4444 !important;
            font-weight: bold;
        }

        .score-badge {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00f3ff, #a020f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 480px) {
            .question {
                font-size: 3rem;
            }
            
            input[type="number"] {
                width: 120px;
                padding: 12px;
                font-size: 1.5rem;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="card" id="game-card">
        <div id="start-screen">
            <h1>QuickMath!</h1>
            <p>
                Jawab 10 soal secepat mungkin.<br>Waktu tiap soal hanya 10 detik!
            </p>
            <button onclick="startGame()">Mulai Bermain</button>
        </div>

        <div id="play-screen" class="hidden">
            <div id="quest-number">Soal 1 / 10</div>
            <div class="timer-bar"><div id="progress"></div></div>
            <div class="question" id="display-question">0 + 0</div>
            <input type="number" id="answer-input" placeholder="?" autocomplete="off">
            <br>
            <small>Tekan Enter untuk jawab</small>
        </div>

        <div id="result-screen" class="hidden">
            <h1>Selesai!</h1>
            <div class="score-badge" id="final-score">Skor: 0</div>
            <div class="result-container">
                <table>
                    <thead>
                        <tr>
                            <th>Soal</th>
                            <th>Input</th>
                            <th>Benar</th>
                        </tr>
                    </thead>
                    <tbody id="result-body"></tbody>
                </table>
            </div>
            <button onclick="startGame()">Main Lagi</button>
        </div>
    </div>

    <script>
        let currentQuestion = 0;
        let score = 0;
        let timeLeft = 10;
        let timerInterval;
        let gameData = [];
        let currentAnswer = 0;

        const startScreen = document.getElementById("start-screen");
        const playScreen = document.getElementById("play-screen");
        const resultScreen = document.getElementById("result-screen");
        const inputField = document.getElementById("answer-input");
        const progress = document.getElementById("progress");

        function startGame() {
            currentQuestion = 0;
            score = 0;
            gameData = [];
            startScreen.classList.add("hidden");
            resultScreen.classList.add("hidden");
            playScreen.classList.remove("hidden");
            nextQuestion();
        }

        function generateQuestion() {
            const ops = ["+", "-", "*", "/"];
            let a = Math.floor(Math.random() * 10);
            let b = Math.floor(Math.random() * 10);
            let op = ops[Math.floor(Math.random() * 4)];

            if (op === "/") {
                if (b === 0) b = 1;
                a = a * b;
            }
            let qText = a + " " + op + " " + b;
            let ans = 0;
            if (op == "+") ans = a + b;
            if (op == "-") ans = a - b;
            if (op == "*") ans = a * b;
            if (op == "/") ans = a / b;

            return { qText, ans };
        }

        function nextQuestion() {
            if (currentQuestion >= 10) {
                endGame();
                return;
            }

            currentQuestion++;
            document.getElementById("quest-number").innerText = 'Soal ' + currentQuestion + ' / 10';
            const q = generateQuestion();
            document.getElementById("display-question").innerText = q.qText;
            currentAnswer = q.ans;

            inputField.value = "";
            inputField.focus();

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 10;
            progress.style.width = "100%";
            progress.style.transition = "none";
            progress.offsetHeight;
            progress.style.transition = "width 10s linear";
            progress.style.width = "0%";

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) {
                    processAnswer(null);
                }
            }, 1000);
        }

        function processAnswer(userValue) {
            clearInterval(timerInterval);
            const isCorrect = userValue !== null && parseFloat(userValue) === currentAnswer;

            gameData.push({
                question: document.getElementById("display-question").innerText,
                userAnswer: userValue !== null ? userValue : "-",
                correctAnswer: currentAnswer,
                isCorrect: isCorrect
            });

            if (isCorrect) {
                score++;
            }

            if (currentQuestion < 10) {
                nextQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            playScreen.classList.add("hidden");
            resultScreen.classList.remove("hidden");

            document.getElementById("final-score").innerText = "Skor: " + score + " / 10";

            const resultBody = document.getElementById("result-body");
            resultBody.innerHTML = "";

            gameData.forEach((data, index) => {
                const row = document.createElement("tr");
                const rowClass = data.isCorrect ? "row-correct" : "row-wrong";
                row.innerHTML = `
                    <td>${index + 1}. ${data.question}</td>
                    <td>${data.userAnswer}</td>
                    <td class="${rowClass}">${data.correctAnswer}</td>
                `;
                resultBody.appendChild(row);
            });
        }

        inputField.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                processAnswer(inputField.value);
            }
        });
    </script>
</body>
</html>
